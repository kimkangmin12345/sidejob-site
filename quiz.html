<!DOCTYPE html>
<html>
<head>
<title>부업 추천 테스트</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>나에게 맞는 부업 찾기</h1>
</header>

<div class="container">

<h2>질문에 답해주세요</h2>

<form id="quiz">

<p>1. 하루 몇 시간 가능?</p>
<select id="time">
<option value="online">1~2시간</option>
<option value="offline">3~4시간</option>
</select>

<p>2. 집에서 일하고 싶은가?</p>
<select id="home">
<option value="yes">예</option>
<option value="no">아니오</option>
</select>

<p>3. 사람 만나는거 괜찮나?</p>
<select id="people">
<option value="yes">예</option>
<option value="no">아니오</option>
</select>

<p>4. 컴퓨터 사용 가능?</p>
<select id="computer">
<option value="yes">예</option>
<option value="no">아니오</option>
</select>

<p>5. 글쓰기 가능?</p>
<select id="writing">
<option value="yes">예</option>
<option value="no">아니오</option>
</select>

<p>6. 판매 관심 있나?</p>
<select id="sell">
<option value="yes">예</option>
<option value="no">아니오</option>
</select>

<p>7. 초기 자본 있나?</p>
<select id="money">
<option value="yes">있다</option>
<option value="no">없다</option>
</select>

<br><br>

<button type="button" onclick="recommend()">추천 보기</button>

</form>

<h2 id="result"></h2>

</div>

<script>

function recommend(){

let home=document.getElementById("home").value
let people=document.getElementById("people").value
let computer=document.getElementById("computer").value
let writing=document.getElementById("writing").value
let sell=document.getElementById("sell").value

let result=[]

if(home=="yes" && computer=="yes"){
result.push("블로그 운영")
result.push("데이터 라벨링")
}

if(people=="yes"){
result.push("배달 부업")
}

if(writing=="yes"){
result.push("전자책 판매")
}

if(sell=="yes"){
result.push("스마트스토어")
result.push("중고거래")
}

document.getElementById("result").innerHTML="추천 부업: <br>"+result.join("<br>")

}

</script>

</body>
</html>
