<!DOCTYPE html>
<html>

<body>

<header>
<h1>사이트 소개</h1>
</header>

<div class="container">

<h2>부업 찾기 사이트</h2>

<p>
이 사이트는 다양한 부업 정보를 모아
누구나 쉽게 자신에게 맞는 부업을 찾을 수 있도록
도와주는 사이트입니다.
</p>

<h3>사이트 목적</h3>

<ul>
<li>현실적인 부업 정보 제공</li>
<li>초보자도 쉽게 시작 가능한 부업 소개</li>
<li>부업 선택을 돕는 추천 시스템 제공</li>
</ul>

<h3>앞으로 추가될 기능</h3>

<ul>
<li>부업 추천 테스트</li>
<li>부업 리뷰 시스템</li>
<li>수익 계산 기능</li>
</ul>

</div>

</body>
</html>
